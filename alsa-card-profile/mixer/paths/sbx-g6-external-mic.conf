[General]
priority = 90
description-key=analog-input-microphone

[Element Input Gain Control]
volume = 2

[Element External Mic]
switch = mute
volume = merge
override-map.1 = all
override-map.2 = all-left,all-right

[Element PCM Capture Source]
enumeration = select

[Option PCM Capture Source:External Mic]
name = analog-input-microphone
required-any = any

[Element Line In]
switch = off
volume = off

[Element S/PDIF In]
switch = off
volume = off

[Element What U Hear]
switch = off
volume = off