[General]
auto-profiles = yes

[Mapping analog-stereo-input]
device-strings = hw:%f
channel-map = left,right
paths-input = sbx-g6-external-mic sbx-g6-linein sbx-g6-what-u-hear
direction = input

[Mapping analog-stereo-output]
device-strings = front:%f
channel-map = left,right
paths-output = sbx-g6-output
direction = output